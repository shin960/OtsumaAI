name: Build and Deploy JupyterLite

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build JupyterLite site
        run: |
          rm -rf dist
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>AI基礎　グループ演習</title>
          </head>
          <body>
              <h2><a href="./A/index.html">A:ジェミニ</a></h2>
              <h2><a href="./D/apurigroup.html">D:でぃ～</a></h2>
              <h2><a href="./F/index.html">F:海鮮丼</a></h2>
              <h2><a href="./notebooks/">G:みじんこ</a></h2>
          </body>
          </html>
          EOF
          jupyter lite build --contents notebooks --output-dir dist/notebooks

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4