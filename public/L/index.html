
<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UVガードナビ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>☀️ UVガードナビ</h1>

<div class="card">

<label>肌タイプ</label>
<select id="skinType">
<option value="1">タイプ1（とても色白）</option>
<option value="2">タイプ2（色白）</option>
<option value="3">タイプ3（普通）</option>
<option value="4">タイプ4（やや色黒）</option>
<option value="5">タイプ5（色黒）</option>
<option value="6">タイプ6（かなり色黒）</option>
</select>

<label>SPF</label>
<input type="number" id="spf" value="30">

<label>PA</label>
<select id="pa">
<option value="1">PA+</option>
<option value="1.2">PA++</option>
<option value="1.4">PA+++</option>
<option value="1.6">PA++++</option>
</select>

<button onclick="getLocation()">
📍 現在地から診断
</button>

</div>

<div class="result">

<h2>現在のUV情報</h2>

<p id="uv">-</p>

<p id="danger">-</p>

<p id="time">-</p>

<hr>

<h2>🟢 今日の安全時間帯</h2>

<p id="safeTime">-</p>

<hr>

<h2>⚠️ UVアラート</h2>

<p id="alert">-</p>

<hr>

<h2>📈 今日のUV変化</h2>

<canvas id="chart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
