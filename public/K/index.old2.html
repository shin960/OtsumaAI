<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI気分まかせ御飯 - Tap & Eat</title>
    <style>
        /* === CSS部分 === */
        :root {
            --primary-color: #ff4081;
            --bg-color: #fff0f5;
            --card-color: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--primary-color);
        }

        .section {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        /* 予算スライダー */
        .range-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex: 1;
            accent-color: var(--primary-color);
        }
        .price-display {
            font-weight: bold;
            color: var(--primary-color);
            min-width: 80px;
            text-align: right;
        }

        /* 気分ボタン */
        .mood-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .mood-btn {
            background: #f0f3f8;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .mood-btn.selected {
            background: #ffebeb;
            border-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: bold;
        }

        .arrow {
            font-size: 40px;
            color: var(--primary-color);
            margin: 10px 0;
        }

        /* ルーレット */
        #wheel {
            width: 220px;
            height: 220px;
            margin: 20px auto;
            border-radius: 50%;
            background: conic-gradient(
                #ff9aa2 0deg 60deg,
                #ffd166 60deg 120deg,
                #90dbf4 120deg 180deg,
                #cdb4db 180deg 240deg,
                #a8e6cf 240deg 300deg,
                #ffcad4 300deg 360deg
            );
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 5s cubic-bezier(.15,.8,.25,1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        #wheelText {
            font-size: 45px;
        }

        /* ボタン */
        .submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
            transition: transform 0.1s;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }

        /* 結果枠 */
        .result-area {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: #fff5f5;
            border: 2px dashed var(--primary-color);
            display: none;
        }

        #result {
            font-size: 30px;
            color: var(--primary-color);
            margin: 0 0 10px 0;
        }

        #comment {
            font-size: 18px;
            color: #555;
            margin: 0 0 15px 0;
        }

        .food-image-container {
            width: 100%;
            margin-bottom: 15px;
        }
        .food-image {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* ボタンレイアウト */
        .action-btns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }
        .action-btn {
            padding: 10px 10px;
            font-size: 13px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .map-btn { background: #4caf50; color: white; }
        .keep-btn { background: #ff9800; color: white; }
        .retry-btn { background: #757575; color: white; grid-column: span 2; }

        /* お気に入りリスト */
        .keep-list-area {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
            text-align: left;
        }
        .keep-title {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
        }
        .keep-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .keep-tag {
            background: #ffe0eb;
            color: var(--primary-color);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍽️ AI気分まかせ御飯</h1>

        <div class="section">
            <label>① 予算の目安は？</label>
            <div class="range-group">
                <input type="range" id="priceRange" min="500" max="3000" step="500" value="3000">
                <span class="price-display" id="priceValue">3,000円</span>
            </div>
        </div>

        <div class="section">
            <label>② 今の気分は？</label>
            <div class="mood-options">
                <button class="mood-btn selected" data-mood="heavy">ガッツリ系🔥</button>
                <button class="mood-btn" data-mood="light">軽め🍃</button>
                <button class="mood-btn" data-mood="sweet">甘いもの！🍰</button>
                <button class="mood-btn" data-mood="all">何でもいい🎲</button>
            </div>
        </div>

        <div class="arrow">▼</div>

        <div id="wheel">
            <div id="wheelText">🎲</div>
        </div>

        <button class="submit-btn" id="decideBtn" onclick="decideFood()">料理を提案する！</button>

        <div class="result-area" id="resultArea">
            <h2 id="result"></h2>
            <p id="comment"></p>
            <div class="food-image-container">
                <img id="foodImg" class="food-image" src="" alt="料理の画像">
            </div>
            
            <div class="action-btns" id="actionBtns" style="display: none;">
                <button class="action-btn map-btn" id="mapBtn">近くの店を探す 🗺️</button>
                <button class="action-btn keep-btn" id="keepBtn">候補にキープ！ ⭐</button>
                <button class="action-btn retry-btn" onclick="resetApp()">もう一度回す 🔄</button>
            </div>
        </div>

        <div class="keep-list-area" id="keepListArea" style="display: none;">
            <div class="keep-title">⭐ キープ中のご飯候補</div>
            <div class="keep-tags" id="keepTags"></div>
        </div>
    </div>

        let currentAngle = 0;
        let keepList = [];

        function decideFood() {
            const maxPrice = parseInt(priceRange.value);

            let candidates = [];
            if (selectedMood === "all") {
                candidates = foodDatabase.filter(food => food.price <= maxPrice);
            } else {
                candidates = foodDatabase.filter(food => food.price <= maxPrice && food.mood === selectedMood);
            }
            
            if (candidates.length === 0) {
                candidates = foodDatabase.filter(food => food.price <= maxPrice);
            }

            const finalChoice = candidates[Math.floor(Math.random() * candidates.length)];

            const wheel = document.getElementById("wheel");
            const foodImg = document.getElementById("foodImg");
            const resultArea = document.getElementById("resultArea");
            const decideBtn = document.getElementById("decideBtn");
            const actionBtns = document.getElementById("actionBtns");

            decideBtn.disabled = true;
            actionBtns.style.display = "none";

            const additionalAngle = 360 * 5 + Math.floor(Math.random() * 360);
            currentAngle += additionalAngle; 
            wheel.style.transform = `rotate(${currentAngle}deg)`;

            resultArea.style.display = "block";
            document.getElementById("result").innerText = "🎲 考え中...";
            document.getElementById("comment").innerText = "";
            foodImg.style.display = "none";

            setTimeout(() => {
                document.getElementById("result").innerText = finalChoice.name;
                document.getElementById("comment").innerText = finalChoice.comment;

                foodImg.src = finalChoice.img;
                foodImg.style.display = "block";

                const mapBtn = document.getElementById("mapBtn");
                mapBtn.onclick = () => {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(finalChoice.searchName)}`, '_blank');
                };

                const keepBtn = document.getElementById("keepBtn");
                keepBtn.onclick = () => {
                    if (!keepList.includes(finalChoice.name)) {
                        keepList.push(finalChoice.name);
                        updateKeepListUI();
                    }
                    keepBtn.innerText = "キープしました！⭐";
                    keepBtn.disabled = true;
                };
                
                keepBtn.innerText = "候補にキープ！ ⭐";
                keepBtn.disabled = false;

                actionBtns.style.display = "flex";
                decideBtn.disabled = false;
            }, 5000);
        }

        function updateKeepListUI() {
            const keepListArea = document.getElementById("keepListArea");
            const keepTags = document.getElementById("keepTags");
            keepTags.innerHTML = "";
            
            keepList.forEach(foodName => {
                const tag = document.createElement("div");
                tag.className = "keep-tag";
                tag.innerText = foodName;
                keepTags.appendChild(tag);
            });

            if (keepList.length > 0) {
                keepListArea.style.display = "block";
            }
        }

        function resetApp() {
            document.getElementById("resultArea").style.display = "none";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
