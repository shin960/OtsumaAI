<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラクター何歳クイズ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="pink">

<!-- タイトル画面 -->
<div id="startScreen">

    <h1>🎮 キャラクター何歳クイズ 🎮</h1>

    <p class="subtitle">
        有名キャラクターの年齢を当てよう！
    </p>

    <h2>🌈 背景を選んでね 🌈</h2>

    <div class="backgroundButtons">

        <button onclick="changeBackground('pink')">🌸 ピンク</button>

        <button onclick="changeBackground('blue')">💙 水色</button>

        <button onclick="changeBackground('purple')">💜 むらさき</button>

        <button onclick="changeBackground('green')">💚 みどり</button>

        <button onclick="changeBackground('yellow')">💛 イエロー</button>

    </div>

    <button id="startButton" onclick="startGame()">
        ▶ ゲームスタート
    </button>

</div>


<!-- ゲーム画面 -->
<div id="gameScreen" style="display:none;">

    <h1>🎮 キャラクター何歳クイズ 🎮</h1>

    <div id="hp">
        ❤️❤️❤️
    </div>

    <div id="progress">
        第1問 / 20問
    </div>

    <div id="score">
        正解数：0
    </div>

    <h2 id="question"></h2>

    <div id="choices"></div>

    <p id="message"></p>

</div>


<!-- 結果画面 -->
<div id="resultScreen" style="display:none;">

    <h1>🏆 RESULT 🏆</h1>

    <h2 id="resultText"></h2>

    <h1 id="rank"></h1>

    <button onclick="restart()">
        🔄 もう一度遊ぶ
    </button>

</div>


<!-- ゲームオーバー -->
<div id="gameOverScreen" style="display:none;">

    <h1 class="gameOver">
        💀 GAME OVER 💀
    </h1>

    <h2 id="gameOverScore"></h2>

    <button onclick="restart()">
        🔄 もう一度遊ぶ
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
