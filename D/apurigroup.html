        const currentQuiz = quizData[currentQuestionIndex];

        document.getElementById("dish-name").innerText = currentQuiz.name;

        document.getElementById("submit-button").style.display = "inline-block";

            label.id = `label-${index}`;

            checkbox.type = "checkbox";
            checkbox.value = choice;
            checkbox.id = `check-${index}`;
            
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(choice));
            choicesContainer.appendChild(label);
        });
    }

    function submitAnswer() {
        const currentQuiz = quizData[currentQuestionIndex];
        const resultMessage = document.getElementById("result-message");
        
        const selectedChoices = [];
        currentQuiz.choices.forEach((choice, index) => {
            const checkbox = document.getElementById(`check-${index}`);
            if (checkbox.checked) {
                selectedChoices.push(choice);
            }
            checkbox.disabled = true;
        });

        const isCorrect = 
            selectedChoices.length === currentQuiz.answers.length && 
            selectedChoices.every(val => currentQuiz.answers.includes(val));

        currentQuiz.choices.forEach((choice, index) => {
            const label = document.getElementById(`label-${index}`);
            const checkbox = document.getElementById(`check-${index}`);
            
            if (currentQuiz.answers.includes(choice)) {
                label.classList.add("correct");
            } else if (checkbox.checked) {
                label.classList.add("incorrect");
            }
        });

        resultMessage.style.display = "block";
        if (isCorrect) {
            score++;
            resultMessage.innerHTML = `<span style="color:#2ecc71; font-size:22px; font-weight:bold;">⭕ 正解！お見事！</span><br><br>${currentQuiz.info}`;

        }

        document.getElementById("submit-button").style.display = "none";
        document.getElementById("next-button").style.display = "inline-block";
    }

            `;
            document.getElementById("progress").style.display = "none";

    function shuffleArray(array) {
        const clone = [...array];
        for (let i = clone.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [clone[i], clone[j]] = [clone[j], clone[i]];
        }
        return clone;
    }

    // 全15問からランダムに10問を選出する仕組み
    const quizData = shuffleArray(originalQuizData).slice(0, 10);

    let currentQuestionIndex = 0;
    let score = 0;
    let lives = 3;
    let timerInterval = null;
    let comboCount = 0; // 連鎖正解カウンター
    
    // --- 🔊 進化したオーディオジェネレーター ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type, combo = 0) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'start') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.setValueAtTime(659.25, now + 0.1);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } 
        else if (type === 'correct') {
            // コンボ数に応じて正解音のピッチが高くなる！
            osc.type = 'triangle';
            const baseFreq = 880 + (combo * 120);
            osc.frequency.setValueAtTime(baseFreq, now);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 2, now + 0.15);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } 
        else if (type === 'incorrect') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.setValueAtTime(130, now + 0.2);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.45);
            osc.start(now);
            osc.stop(now + 0.45);
        }
        else if (type === 'win') {
            osc.type = 'sine';
            const notes = [523.25, 587.33, 659.25, 783.99, 1046.50, 1318.51];
            notes.forEach((note, index) => {
                osc.frequency.setValueAtTime(note, now + index * 0.08);
            });
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.setValueAtTime(0.2, now + 0.4);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
            osc.start(now);
            osc.stop(now + 0.9);
        }
        else if (type === 'gameover') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(280, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.7);
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            osc.start(now);
            osc.stop(now + 0.8);
        }
    }

    // ⚡ 画面揺らし（シェイク）＋赤フラッシュ
    function triggerDamageEffect() {
        const gameCard = document.getElementById("game-card");
        gameCard.classList.add("shake-active");
        
        // 画面を一瞬赤くするフラッシュ
        const originalBg = document.body.style.backgroundColor;
        document.body.style.backgroundColor = "#2a080c";
        
        setTimeout(() => {
            gameCard.classList.remove("shake-active");
            document.body.style.backgroundColor = originalBg;
        }, 400);
    }

    function updateLivesDisplay() {
        document.getElementById("hearts").innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
    }

    function startTimer() {
        // ⚡ 後半ステージになるほど制限時間が短くなる（最大15秒〜最小7秒）
        let maxTime = Math.max(15 - currentQuestionIndex, 7); 
        let timeLeft = maxTime;
        
        const timerBox = document.getElementById("timer-box");
        const gauge = document.getElementById("timer-gauge");
        
        timerBox.innerText = `⏱ 残り ${timeLeft} 秒`;
        gauge.style.transition = "none";
        gauge.style.width = "100%";
        timerBox.style.color = "#ff4757";

        // 動的なカウントダウン時間に合わせてゲージを滑らかに縮小
        setTimeout(() => {
            gauge.style.transition = `width ${maxTime}s linear`;
            gauge.style.width = "0%";
        }, 50);

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timerBox.innerText = `⏱ 残り ${timeLeft} 秒`;

            if (timeLeft <= 4) {
                timerBox.style.color = "#ff6b81";
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timeOutAction();
            }
        }, 1000);
    }

    function handleImageError() {
        document.getElementById("dish-image").style.display = "none";
        document.getElementById("dish-emoji").style.display = "block";
    }

    function loadQuestion() {
        if (lives <= 0) {
            endGame(true);
            return;
        }

        if (currentQuestionIndex > 0) playSound('start');

        const currentQuiz = quizData[currentQuestionIndex];
        document.getElementById("progress").innerText = `STAGE ${currentQuestionIndex + 1} / ${quizData.length}`;
        
        const imgTag = document.getElementById("dish-image");
        const emojiTag = document.getElementById("dish-emoji");
        imgTag.style.display = "block";
        emojiTag.style.display = "none";
        
        imgTag.src = currentQuiz.image;
        emojiTag.innerText = currentQuiz.emoji;

        document.getElementById("dish-name").innerText = currentQuiz.name;
        document.getElementById("dish-country").innerText = `発祥・文化圏: ${currentQuiz.country}`;
        
        const resultMessage = document.getElementById("result-message");
        resultMessage.innerText = "";
        resultMessage.style.display = "none";
        document.getElementById("submit-button").style.display = "inline-block";
        document.getElementById("next-button").style.display = "none";
        
        const choicesContainer = document.getElementById("choices-container");
        choicesContainer.innerHTML = "";
        
        const shuffledChoices = shuffleArray(currentQuiz.choices);
        shuffledChoices.forEach((choice, index) => {
            const label = document.createElement("label");
            label.classList.add("choice-label");
            label.id = `label-${index}`;
            
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = choice;
            checkbox.id = `check-${index}`;
            
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(choice));
            choicesContainer.appendChild(label);
        });

        updateLivesDisplay();
        startTimer();
    }

    function submitAnswer() {
        clearInterval(timerInterval);
        // ゲージの減少アニメをピタッと止める
        const gauge = document.getElementById("timer-gauge");
        gauge.style.width = window.getComputedStyle(gauge).width;
        gauge.style.transition = "none";

        const currentQuiz = quizData[currentQuestionIndex];
        const resultMessage = document.getElementById("result-message");
        
        const selectedChoices = [];
        const container = document.getElementById("choices-container");
        const labels = container.getElementsByClassName("choice-label");

        for (let i = 0; i < labels.length; i++) {
            const checkbox = document.getElementById(`check-${i}`);
            const choiceText = checkbox.value;
            if (checkbox.checked) {
                selectedChoices.push(choiceText);
            }
            checkbox.disabled = true;

            if (currentQuiz.answers.includes(choiceText)) {
                labels[i].classList.add("correct");
            } else if (checkbox.checked) {
                labels[i].classList.add("incorrect");
            }
        }

        const isCorrect = 
            selectedChoices.length === currentQuiz.answers.length && 
            selectedChoices.every(val => currentQuiz.answers.includes(val));

        resultMessage.style.display = "block";
        const comboDisplay = document.getElementById("combo-display");

        if (isCorrect) {
            score++;
            comboCount++;
            playSound('correct', comboCount); // ⚡ コンボ音
            
            if (comboCount >= 2) {
                comboDisplay.innerText = `🔥 ${comboCount} COMBO!! (正解音ピッチ上昇中)`;
            } else {
                comboDisplay.innerText = "";
            }

            resultMessage.innerHTML = `<span style="color:#2ed573; font-size:20px; font-weight:bold;">⭕ STAGE CLEAR!</span><br><br>${currentQuiz.info}`;
        } else {
            lives--;
            comboCount = 0; // コンボ途切れる
            comboDisplay.innerText = "";
            updateLivesDisplay();
            playSound('incorrect');
            triggerDamageEffect(); // ⚡ 画面揺らし
            
            const answerText = currentQuiz.answers.join('、');
            resultMessage.innerHTML = `<span style="color:#ff4757; font-size:20px; font-weight:bold;">❌ DAMAGE!（ライフ減少）</span><br>正解の食材: <strong>${answerText}</strong><br><br>${currentQuiz.info}`;
        }

        document.getElementById("submit-button").style.display = "none";
        document.getElementById("next-button").style.display = "inline-block";
        
        if (lives <= 0) {
            document.getElementById("next-button").innerText = "結果発表へ";
        }
    }

    function timeOutAction() {
        lives--;
        comboCount = 0;
        document.getElementById("combo-display").innerText = "";
        updateLivesDisplay();
        playSound('incorrect');
        triggerDamageEffect(); // ⚡ 画面揺らし
        
        const currentQuiz = quizData[currentQuestionIndex];
        const resultMessage = document.getElementById("result-message");
        
        const container = document.getElementById("choices-container");
        const labels = container.getElementsByClassName("choice-label");

        for (let i = 0; i < labels.length; i++) {
            const checkbox = document.getElementById(`check-${i}`);
            const choiceText = checkbox.value;
            checkbox.disabled = true;
            if (currentQuiz.answers.includes(choiceText)) {
                labels[i].classList.add("correct");
            }
        }

        resultMessage.style.display = "block";
        const answerText = currentQuiz.answers.join('、');
        resultMessage.innerHTML = `<span style="color:#ff4757; font-size:20px; font-weight:bold;">⏱ TIME OUT!（時間切れダメージ）</span><br>正解の食材: <strong>${answerText}</strong><br><br>${currentQuiz.info}`;

        document.getElementById("submit-button").style.display = "none";
        document.getElementById("next-button").style.display = "inline-block";
        
        if (lives <= 0) {
            document.getElementById("next-button").innerText = "結果発表へ";
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length && lives > 0) {
            loadQuestion();
        } else {
            endGame(lives <= 0);
        }
    }

    function endGame(isGameOver) {
        clearInterval(timerInterval);
        document.getElementById("combo-display").style.display = "none";
        
        let title = "🎉 サバイバル達成！";
        let titleColor = "#ffd43b";
        let evaluation = "";
        
        if (isGameOver) {
            title = "💀 GAME OVER";
            titleColor = "#ff4757";
            playSound('gameover');
        } else {
            playSound('win');
        }

        if (score === 10) evaluation = "【クレイジージャーニー級】<br>地球上のすべての料理を完璧に解析した伝説の美食大使。あなたの前で隠し味は通用しない！🏆";
        else if (score >= 8) evaluation = "【ベテラン現地コーディネーター】<br>マニアックな屋台料理の裏側まで知り尽くした旅のプロ。後半の超スピードタイマーを生き残った猛者。✨";
        else if (score >= 5) evaluation = "【好奇心旺盛なバックパッカー】<br>普通の観光客よりはるかにグルメ！メニューが読めなくても美味しいものを引き当てる強運の持ち主。😋";
        else if (score >= 2) evaluation = "【パッケージツアー旅行者】<br>まだ見ぬ世界の料理がたくさんありますね！まずは安全なガイドブック掲載店から攻めましょう。✈️";
        else evaluation = "【マクドナルド信者】<br>海外に行ってもきっと知ってるチェーン店に駆け込むタイプ。ポテトの安心感は異常ですからね。🍟";

        document.getElementById("quiz-area").innerHTML = `
            <h2 style="color:${titleColor}; font-size: 32px; margin-top:10px;">${title}</h2>
            <p style="font-size: 20px; font-weight: bold; margin: 20px 0;">最終クリアステージ: <span style="color:#ff6b6b; font-size: 26px;">${score}</span> / ${quizData.length}</p>
            <div style="line-height: 1.8; background:#1c1e2e; padding:20px; border-radius:10px; border: 1px solid #2a2d3d; text-align:center;">
                <span style="color:#ffd43b; font-size:18px; font-weight:bold;">獲得した称号</span><br><br>${evaluation}
            </div>
            <button class="action-btn" onclick="location.reload()" style="margin-top: 30px; width:100%;">もう一度挑戦する</button>
        `;
        document.getElementById("progress").style.display = "none";
        document.getElementById("timer-box").style.display = "none";
        document.getElementById("timer-gauge").parentElement.style.display = "none";
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
